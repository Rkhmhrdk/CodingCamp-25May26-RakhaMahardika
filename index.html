<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <section class="balance-section">
            <div class="balance-card">
                <h2>Total Balance</h2>
                <p class="balance-amount" id="balanceAmount">Rp 0</p>
            </div>
        </section>

        <section class="form-section">
            <h2>Add Transaction</h2>
            <form id="expenseForm">
                <div class="form-group">
                    <label for="expenseName">Item Name</label>
                    <input type="text" id="expenseName" name="expenseName" placeholder="Susu" required>
                </div>

                <div class="form-group">
                    <label for="expenseAmount">Amount</label>
                    <input type="number" id="expenseAmount" name="expenseAmount" placeholder="10" min="0.01" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="expenseCategory">Category</label>
                    <select id="expenseCategory" name="expenseCategory" required>
                        <option value="">Select a category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                    </select>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button type="submit" class="btn-primary">Add Transaction</button>
            </form>
        </section>

        <div class="content-grid">
            <section class="transaction-section">
                <div class="section-header">
                    <h2>Transactions</h2>
                    <select id="sortSelect" class="sort-select">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="amount-desc">Highest Amount</option>
                        <option value="amount-asc">Lowest Amount</option>
                        <option value="category">By Category</option>
                    </select>
                </div>
                <div class="empty-state" id="emptyState">
                    <p>No transactions yet. Add your first expense.</p>
                </div>
                <div class="transaction-list" id="transactionList"></div>
            </section>

            <section class="chart-section">
                <h2>Spending by Category</h2>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
                <button id="addCategoryBtn" class="btn-add-category">+ Manage Categories</button>
            </section>
        </div>

        <!-- Category Management Modal -->
        <div id="categoryModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Manage Categories</h3>
                    <button id="closeCategoryModal" class="btn-close-modal" aria-label="Close modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm" class="category-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newCategoryName">Category Name</label>
                                <input type="text" id="newCategoryName" placeholder="e.g., Shopping" maxlength="20" required>
                            </div>
                            <div class="form-group">
                                <label for="categoryColor">Color</label>
                                <input type="color" id="categoryColor" value="#9b59b6" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Add Category</button>
                    </form>
                    <div class="category-list-container">
                        <h4>Existing Categories</h4>
                        <div id="categoryList" class="category-list"></div>
                        <p class="category-note">Note: Default categories (Food, Transport, Fun) cannot be deleted.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
